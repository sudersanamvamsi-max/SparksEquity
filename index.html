<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- viewport-fit=cover so env(safe-area-inset-*) works on notched phones -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f3b46" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>RepairTally — Repair Cost Estimator</title>
  <style>
    /* ============================================================= *
     * Design tokens. Professional slate + teal + "money green".     *
     * Deliberately NOT orange-on-dark-gray.                         *
     * ============================================================= */
    :root {
      --bg:          #eaeef2;
      --surface:     #ffffff;
      --surface-alt: #f5f8fa;
      --border:      #d9e1e8;
      --border-2:    #c6d2db;

      --text:        #17242e;
      --text-2:      #435562;
      --muted:       #74889a;

      --primary:       #0f3b46;   /* deep teal-navy   */
      --primary-600:   #12586a;
      --primary-tint:  #e2eef1;
      --accent:        #1f8f66;   /* money green      */
      --accent-600:    #157552;
      --accent-tint:   #e3f3ec;
      --danger:        #b0473e;
      --danger-tint:   #f6e6e4;
      --flag:          #9a6b12;   /* price override flag (amber, used sparingly) */
      --flag-tint:     #f6edd8;

      --shadow-1: 0 1px 2px rgba(16,40,52,.08), 0 1px 3px rgba(16,40,52,.06);
      --shadow-2: 0 6px 24px rgba(16,40,52,.16);

      --radius:   14px;
      --radius-sm: 10px;
      --tap: 44px;                /* minimum touch target */

      --sat: env(safe-area-inset-top);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
      --sar: env(safe-area-inset-right);

      --maxw: 720px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 15px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
            Helvetica, Arial, "Apple Color Emoji", sans-serif;
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      padding-left: var(--sal);
      padding-right: var(--sar);
    }
    button { font: inherit; color: inherit; cursor: pointer; }
    input { font: inherit; }
    ul { list-style: none; margin: 0; padding: 0; }

    #app { max-width: var(--maxw); margin: 0 auto; min-height: 100vh; }

    /* ---------------- App bar (fixed / always visible) ------------- */
    .appbar {
      position: sticky; top: 0; z-index: 20;
      background: var(--primary);
      color: #eaf4f5;
      padding: calc(var(--sat) + 10px) 14px 12px;
      box-shadow: var(--shadow-1);
    }
    .appbar-row { display: flex; align-items: center; gap: 10px; }
    .appbar-title { flex: 1; min-width: 0; }
    .proj-name {
      font-weight: 700; font-size: 17px; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .proj-sub { font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: #9dc3c9; }

    .totals-row { margin-top: 12px; align-items: flex-end; gap: 14px; }
    .grand { font-size: 30px; font-weight: 800; color: #fff; letter-spacing: -.01em; line-height: 1; }
    .progress-wrap { flex: 1; }
    .progress-bar {
      height: 8px; border-radius: 999px; background: rgba(255,255,255,.18); overflow: hidden;
    }
    .progress-bar > span {
      display: block; height: 100%; background: var(--accent);
      border-radius: 999px; transition: width .25s ease;
    }
    .progress-label { margin-top: 5px; font-size: 12px; color: #b9d6da; text-align: right; }

    /* ---------------- Buttons ------------------------------------- */
    .btn-primary, .btn-secondary, .btn-ghost, .btn-add, .btn-add-item {
      min-height: var(--tap); border-radius: var(--radius-sm);
      padding: 0 16px; border: 1px solid transparent; font-weight: 600;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:active { background: var(--accent-600); }
    .btn-secondary { background: var(--primary-tint); color: var(--primary); border-color: var(--border-2); }
    .btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border-2); }
    .btn-ghost[disabled] { opacity: .45; cursor: not-allowed; }
    .appbar .btn-ghost { color: #cfe6e9; border-color: rgba(255,255,255,.35); }

    .icon-btn {
      min-width: var(--tap); min-height: var(--tap);
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--radius-sm); border: 1px solid transparent;
      background: transparent; font-size: 18px; color: var(--text-2);
    }
    .appbar .icon-btn { color: #cfe6e9; }
    .icon-btn.danger { color: var(--danger); }
    .icon-btn:active { background: rgba(0,0,0,.06); }

    /* ---------------- Screen scaffolding -------------------------- */
    .screen { padding: 14px 14px calc(28px + var(--sab)); }
    .section-head {
      font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted); font-weight: 700; margin: 6px 4px 10px;
    }

    /* ---------------- Projects list ------------------------------- */
    .proj-list { display: flex; flex-direction: column; gap: 10px; }
    .proj-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; display: flex; align-items: center; gap: 10px;
      box-shadow: var(--shadow-1);
    }
    .proj-card.is-active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
    .proj-card-main { flex: 1; min-width: 0; }
    .proj-card-name { font-weight: 700; font-size: 16px; }
    .proj-card-meta { color: var(--muted); font-size: 12.5px; margin-top: 3px; }
    .proj-card-actions { display: flex; gap: 2px; }

    /* ---------------- Room list ----------------------------------- */
    .room-list { display: flex; flex-direction: column; gap: 10px; }
    .room-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 13px 14px; box-shadow: var(--shadow-1);
    }
    .room-card-top { display: flex; align-items: baseline; gap: 10px; }
    .room-card-name { font-weight: 700; font-size: 16px; flex: 1; min-width: 0; }
    .room-card-total { font-weight: 700; font-size: 16px; color: var(--primary); }
    .room-card-bottom { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .mini-progress { flex: 1; height: 6px; border-radius: 999px; background: var(--border); overflow: hidden; }
    .mini-progress > span { display: block; height: 100%; background: var(--accent); border-radius: 999px; }
    .room-card-meta { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .room-card-bottom .icon-btn { min-width: 36px; min-height: 36px; font-size: 16px; }

    .add-room-bar {
      margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px;
      background: var(--surface); border: 1px dashed var(--border-2);
      border-radius: var(--radius); padding: 12px;
    }
    .add-room-bar .btn-add {
      flex: 1 1 auto; background: var(--surface-alt); color: var(--primary);
      border-color: var(--border-2);
    }

    /* ---------------- Room detail / groups ------------------------ */
    .room-detail-head { padding: 4px 4px 14px; }
    .rd-title { font-size: 22px; font-weight: 800; }
    .rd-sub { color: var(--muted); font-size: 13px; margin-top: 3px; }
    .rd-sub [data-role="room-subtotal"] { color: var(--primary); font-weight: 700; }

    .group {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
      box-shadow: var(--shadow-1);
    }
    .group-head {
      display: flex; align-items: center; gap: 8px; width: 100%;
      padding: 14px; background: transparent; border: 0; text-align: left;
      min-height: var(--tap);
    }
    .chev { transition: transform .18s ease; color: var(--muted); font-size: 12px; }
    .group.is-collapsed .chev { transform: rotate(-90deg); }
    .group-label { flex: 1; font-weight: 700; font-size: 15px; min-width: 0; }
    .group-badge {
      width: 22px; height: 22px; border-radius: 999px; border: 1.5px solid var(--border-2);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 13px; color: transparent;
    }
    .group-badge.is-done { background: var(--accent); border-color: var(--accent); color: #fff; }
    .group-subtotal { font-weight: 700; color: var(--primary); font-variant-numeric: tabular-nums; }
    .group.is-collapsed .group-body { display: none; }
    .group-body { border-top: 1px solid var(--border); }

    .no-action-row {
      display: flex; align-items: center; gap: 10px; padding: 11px 14px;
      background: var(--surface-alt); border-bottom: 1px solid var(--border);
      font-size: 14px; color: var(--text-2); min-height: var(--tap);
    }
    .no-action-row input { width: 22px; height: 22px; }

    .line {
      display: grid;
      grid-template-columns: auto 1fr 84px auto;
      grid-template-areas: "chk main qty total" "chk sub sub del";
      align-items: center; gap: 4px 10px;
      padding: 10px 12px 10px 14px; border-bottom: 1px solid var(--border);
    }
    .line:last-child { border-bottom: 0; }
    .line.is-disabled { opacity: .5; }
    .line-check { grid-area: chk; width: 24px; height: 24px; align-self: start; margin-top: 2px; }
    .line-main { grid-area: main; min-width: 0; }
    .line-name { font-weight: 600; font-size: 14px; }
    .line-name .tag {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
      background: var(--primary-tint); color: var(--primary); padding: 1px 5px; border-radius: 5px; margin-left: 5px;
    }
    .line-sub { grid-area: sub; display: flex; align-items: center; gap: 6px; margin-top: 2px; }
    .price-btn {
      background: transparent; border: 1px dashed var(--border-2); border-radius: 7px;
      padding: 4px 8px; min-height: 30px; color: var(--text-2); font-weight: 600; font-size: 13px;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .price-btn.is-override { border-color: var(--flag); color: var(--flag); background: var(--flag-tint); }
    .price-btn .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--flag); display: inline-block; }
    .price-btn[disabled] { opacity: .6; }
    .unit { color: var(--muted); font-size: 12.5px; }

    .qty {
      grid-area: qty; width: 84px; height: var(--tap);
      border: 1px solid var(--border-2); border-radius: var(--radius-sm);
      padding: 0 10px; text-align: right; font-size: 15px; font-variant-numeric: tabular-nums;
      background: var(--surface);
    }
    .qty:disabled { background: var(--surface-alt); color: var(--muted); }
    .qty:focus { outline: 2px solid var(--primary-600); outline-offset: -1px; border-color: var(--primary-600); }
    .line-total {
      grid-area: total; text-align: right; font-weight: 700; font-size: 14px;
      color: var(--text); font-variant-numeric: tabular-nums; align-self: center;
    }
    .line .del { grid-area: del; justify-self: end; min-width: 36px; min-height: 36px; font-size: 20px; color: var(--muted); }

    .add-item {
      display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 14px; background: var(--surface-alt);
    }
    .add-item input {
      height: var(--tap); border: 1px solid var(--border-2); border-radius: var(--radius-sm);
      padding: 0 10px; background: var(--surface);
    }
    .add-item .ai-name { flex: 1 1 100%; }
    .add-item .ai-cost { flex: 1 1 90px; width: 90px; text-align: right; }
    .add-item .ai-unit { flex: 1 1 90px; min-width: 0; }
    .add-item .btn-add-item { flex: 0 0 auto; background: var(--primary); color: #fff; }

    /* ---------------- Modal (price editor) ------------------------ */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 50; background: rgba(16,32,42,.45);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 0; -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
    }
    .modal {
      background: var(--surface); width: 100%; max-width: var(--maxw);
      border-radius: 18px 18px 0 0; padding: 18px 18px calc(18px + var(--sab));
      box-shadow: var(--shadow-2); animation: sheet .18s ease-out;
    }
    @keyframes sheet { from { transform: translateY(18px); opacity: .6; } to { transform: none; opacity: 1; } }
    .modal-title { font-weight: 800; font-size: 18px; }
    .modal-item { color: var(--text-2); margin: 4px 0 14px; }
    .modal-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 6px; }
    .modal-field span { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .modal-field input {
      height: 50px; border: 1px solid var(--border-2); border-radius: var(--radius-sm);
      padding: 0 14px; font-size: 20px; font-weight: 700; text-align: right;
    }
    .override-note { font-size: 12.5px; color: var(--flag); margin: 8px 2px 4px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
    .modal-actions > * { flex: 1; }

    @media (min-width: 560px) {
      .modal-backdrop { align-items: center; padding: 20px; }
      .modal { border-radius: 18px; }
    }

    /* ---------------- Photos (Phase 2) --------------------------- */
    .photo-section {
      margin-top: 18px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow-1);
    }
    .photo-section-head {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      margin-bottom: 12px;
    }
    .photo-section-title { font-weight: 700; font-size: 15px; }
    .photo-gallery {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 10px;
    }
    .photo-gallery.is-empty { color: var(--muted); font-size: 13px; padding: 8px 2px; }
    .photo-thumb {
      position: relative; border: 1px solid var(--border); border-radius: var(--radius-sm);
      overflow: hidden; aspect-ratio: 1; padding: 0; background: var(--surface-alt);
      min-height: 88px;
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-thumb-label {
      position: absolute; left: 0; right: 0; bottom: 0; padding: 4px 6px;
      font-size: 10px; line-height: 1.2; color: #fff; background: rgba(0,0,0,.55);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .photo-saving {
      margin-top: 8px; font-size: 13px; color: var(--primary);
    }
    .photo-error {
      margin-top: 8px; padding: 10px 12px; border-radius: var(--radius-sm);
      background: var(--danger-tint); color: var(--danger); font-size: 13px;
    }

    .line {
      grid-template-columns: auto 1fr auto 84px auto;
      grid-template-areas: "chk main cam qty total" "chk sub sub sub del";
    }
    .line-cam {
      grid-area: cam; position: relative; min-width: 36px; min-height: 36px;
      font-size: 17px; color: var(--text-2);
    }
    .line-cam .badge {
      position: absolute; top: 2px; right: 2px; min-width: 16px; height: 16px;
      border-radius: 999px; background: var(--accent); color: #fff;
      font-size: 10px; font-weight: 700; line-height: 16px; text-align: center;
      padding: 0 4px;
    }

    .viewer-backdrop {
      position: fixed; inset: 0; z-index: 60; background: rgba(8,18,24,.92);
      display: flex; flex-direction: column; padding: calc(var(--sat) + 10px) 14px calc(14px + var(--sab));
      color: #eaf4f5;
    }
    .viewer-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .viewer-top .btn-ghost { color: #cfe6e9; border-color: rgba(255,255,255,.35); }
    .viewer-title { flex: 1; font-weight: 700; font-size: 16px; min-width: 0; }
    .viewer-img-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      min-height: 0; margin-bottom: 12px;
    }
    .viewer-img-wrap img {
      max-width: 100%; max-height: 100%; object-fit: contain; border-radius: var(--radius-sm);
    }
    .viewer-label input {
      width: 100%; height: 46px; border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,.25); background: rgba(255,255,255,.08);
      color: #fff; padding: 0 12px; margin-bottom: 10px;
    }
    .viewer-actions { display: flex; gap: 8px; }
    .viewer-actions > * { flex: 1; }
    .viewer-actions .btn-danger {
      min-height: var(--tap); border-radius: var(--radius-sm); padding: 0 16px;
      font-weight: 600; background: var(--danger); color: #fff; border: 0;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="modal-root"></div>

  <!-- Vendor libs loaded from disk (no CDN) so export works fully offline,
       including when opened via file://. Do not modify these files. -->
  <script src="vendor/xlsx.bundle.js"></script>
  <script src="vendor/jszip.min.js"></script>

  <script>
  "use strict";
  /* =================================================================
   * RepairTally — Phase 3 (export: styled Excel + photos in a ZIP).
   * Modules in required order: Catalog -> Store -> State -> Calc ->
   * Exporter -> UI -> Events. Only Store touches localStorage and
   * IndexedDB. Vendor libs (XLSX, JSZip) are loaded from disk above.
   * ================================================================= */

  /* ---------- tiny shared helpers ---------- */
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function hasOwn(o, k) { return Object.prototype.hasOwnProperty.call(o, k); }
  function round2(n) { return Math.round((n + Number.EPSILON) * 100) / 100; }
  function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

  // Currency: whole dollars render as "$12,345"; fractional unit costs keep cents.
  function fmt(n) {
    n = round2(Number(n) || 0);
    var opts = Number.isInteger(n)
      ? { minimumFractionDigits: 0, maximumFractionDigits: 0 }
      : { minimumFractionDigits: 2, maximumFractionDigits: 2 };
    return "$" + n.toLocaleString("en-US", opts);
  }
  function fmtTime(ts) {
    if (!ts) return "—";
    try {
      return new Date(ts).toLocaleString(undefined, {
        month: "short", day: "numeric", hour: "numeric", minute: "2-digit"
      });
    } catch (e) { return "—"; }
  }

  var _uidc = 0;
  function uid(prefix) {
    return prefix + Date.now().toString(36) + (_uidc++).toString(36) + Math.random().toString(36).slice(2, 5);
  }

  // Line state is keyed by `${roomId}:${groupId}:${itemId}` so every group
  // instance is independent, even when two groups reuse the same catalog item.
  function lineKey(roomId, groupId, itemId) {
    return roomId + ":" + groupId + ":" + itemId;
  }
  // Group instance state keyed by `${roomId}:${groupId}` (groupId may contain ":").
  function groupKey(roomId, groupId) { return roomId + ":" + groupId; }
  function parseLineKey(key) {
    var first = key.indexOf(":");
    var last = key.lastIndexOf(":");
    if (first === -1 || last === first) return null;
    return [key.slice(0, first), key.slice(first + 1, last), key.slice(last + 1)];
  }
  function splitAtFirstColon(key) {
    var i = key.indexOf(":");
    return [key.slice(0, i), key.slice(i + 1)];
  }
  // v1 keys were `${roomId}:${itemId}` (exactly one colon).
  function isLegacyLineKey(key) { return key.indexOf(":") === key.lastIndexOf(":"); }

  var SCHEMA_VERSION = 2;

  /* =================================================================
   * 1) CATALOG — static data (built from the official CSV below).
   * ================================================================= */
  var Catalog = (function () {
    // The official price list, embedded VERBATIM (single source of truth).
    var CSV = [
      'id,name,cost,unit',
      'ig-01,"Refinish Hardwood Floor",2.35,"sqft"',
      'ig-02,"New Hardwoods 1.5""",10.00,"sqft"',
      'ig-03,"New Hardwoods 2""",4.75,"sqft"',
      'ig-04,"Hardwood Splicing",8.40,"sqft"',
      'ig-05,"Vinyl Plank",2.50,"sqft"',

      'ig-08,"Drywall Repair",900.00,"1,000 sqft"',
      'ig-09,"Wallpaper Removal",250.00,"room"',
      'ig-10,"Interior Door — Hollow Slab",125.00,"ea."',
      'ig-11,"Interior Door Hardware (Knob + Hinges + Labor)",25.00,"ea."',
      'ig-12,"Bifold Door with Framing",400.00,"ea."',
      'ig-13,"Interior Door — Pre-hung",200.00,"ea."',
      'ig-14,"Front Entry Door",475.00,"ea."',
      'ig-15,"Front Entry Door Hardware",80.00,"ea."',
      'ig-16,"Exterior Door Hardware",75.00,"handle"',
      'ig-17,"Exterior Insulated Side Door (Installed)",500.00,"ea."',
      'ig-18,"Sliding Glass Door",1025.00,"ea."',
      'ig-19,"Trim Out (Casing, Crown, Baseboard)",3.75,"LF"',
      'ig-20,"MISC / Punch List",2650.00,"flat"',
      'ig-21,"Finish Out Labor",1350.00,"flat"',
      'ig-22,"Light Fixtures",70.00,"100 sqft"',
      'ig-23,"Bedbug Spray / Heat Treat",475.00,"ea."',
      'ig-24,"Termite Treatment",650.00,"ea."',
      'ig-25,"Demo",1375.00,"variable"',
      'ig-26,"Haul Off",725.00,"load"',
      'ig-27,"Final Cleaning",325.00,"flat"',
      'ig-28,"Staging",0.90,"sqft"',
      'kt-01,"Hinges and Pulls",275.00,"kitchen"',
      'kt-02,"Cabinets Uppers",125.00,"LF"',
      'kt-03,"Cabinets Lowers",150.00,"LF"',
      'kt-04,"Cabinet Door Faces Only",80.00,"door"',
      'kt-05,"Cabinets (Labor & Paint)",1100.00,"kitchen"',
      'kt-06,"Granite + 4"" Splash Guard",40.00,"LF"',
      'kt-07,"Backsplash",725.00,"house"',
      'kt-08,"Misc Woodwork",500.00,"variable"',
      'kt-09,"Tile — Large Areas",6.45,"sqft"',

  var Store = (function () {

    var DB_NAME = "estimator-db";
    var DB_VERSION = 1;
    var PHOTO_STORE = "photos";
    var RT = Catalog.ROOM_TYPES;

    var _dbPromise = null;

    function load() {
      try {

    // Find which group(s) in a room type contain an item (for v1→v2 migration).
    function groupsContainingItem(project, roomType, itemId) {
      return RT[roomType].groups.filter(function (gid) {
        var base = (GROUPS[gid].itemIds || []).filter(function (id) {
          return project.removedItemIds.indexOf(id) === -1;
        });
        if (base.indexOf(itemId) !== -1) return true;
        return Object.keys(project.customItems).some(function (id) {
          return id === itemId && project.customItems[id].groupId === gid;
        });
      });
    }

    function migrateProjectLines(project) {
      var next = {};
      Object.keys(project.lines || {}).forEach(function (key) {
        if (!isLegacyLineKey(key)) {
          next[key] = project.lines[key];
          return;
        }
        var parts = key.split(":");
        var roomId = parts[0];
        var itemId = parts[1];
        var room = project.rooms.find(function (r) { return r.id === roomId; });
        if (!room) return;
        var matches = groupsContainingItem(project, room.type, itemId);
        if (!matches.length) return;
        // If the item appears in multiple groups, assign to the FIRST group in
        // the room type's group list; other groups start unset.
        var groupId = RT[room.type].groups.find(function (gid) {
          return matches.indexOf(gid) !== -1;
        }) || matches[0];
        var newKey = lineKey(roomId, groupId, itemId);
        next[newKey] = project.lines[key];
      });
      project.lines = next;
      if (!project.photos) project.photos = [];
    }

    function migrate(data) {
      if (!data || typeof data !== "object") return null;
      if (!data.schemaVersion) data.schemaVersion = 1;
      while (data.schemaVersion < SCHEMA_VERSION) {
        if (data.schemaVersion === 1) {
          (data.projects || []).forEach(migrateProjectLines);
          data.schemaVersion = 2;
        } else {
          data.schemaVersion++;
        }
      }
      (data.projects || []).forEach(function (p) { if (!p.photos) p.photos = []; });
      return data;

    /* ---- IndexedDB promise helpers ---- */
    function openDB() {
      if (_dbPromise) return _dbPromise;
      _dbPromise = new Promise(function (resolve, reject) {
        if (!window.indexedDB) {
          reject(new Error("IndexedDB unavailable"));
          return;
        }
        var req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = function (e) {
          var db = e.target.result;
          if (!db.objectStoreNames.contains(PHOTO_STORE)) {
            var store = db.createObjectStore(PHOTO_STORE, { keyPath: "id" });
            store.createIndex("projectId", "projectId", { unique: false });

          _db = e.target.result;
          resolve(_db);

      });

        return new Promise(function (resolve, reject) {
          var req = store.put(record);
          req.onsuccess = function () { resolve(record); };
          req.onerror = function () { reject(req.error); };
        });
      });
    }

    function idbGet(id) {
      return idbTx("readonly").then(function (store) {
        return new Promise(function (resolve, reject) {
          var req = store.get(id);
          req.onsuccess = function () { resolve(req.result || null); };
          req.onerror = function () { reject(req.error); };
        });
      });
    }

    function idbDelete(id) {
      return idbTx("readwrite").then(function (store) {
        return new Promise(function (resolve, reject) {
          var req = store.delete(id);
          req.onsuccess = function () { resolve(); };
          req.onerror = function () { reject(req.error); };
        });
      });
    }

    function idbGetAllByProject(projectId) {
      return idbTx("readonly").then(function (store) {
        return new Promise(function (resolve, reject) {
          var idx = store.index("projectId");
          var req = idx.getAll(projectId);
          req.onsuccess = function () { resolve(req.result || []); };
          req.onerror = function () { reject(req.error); };
        });
      });
    }

    function savePhoto(record) {
      try {
        return idbPut(record);
      } catch (e) {
        return Promise.reject(e);
      }
    }

    function getPhoto(id) { return idbGet(id); }

    function deletePhoto(id) {
      try {
        return idbDelete(id);
      } catch (e) {

    }

    function getPhotosForProject(projectId) {
      return idbGetAllByProject(projectId);
    }

    // `project.photos` metadata is the single authority for what exists.
    // Returns only IDB records whose id has a metadata entry, sorted in
    // metadata order; any record WITHOUT one is an orphan and gets deleted

    function getLivePhotosForProject(project) {

      var order = {};

      return idbGetAllByProject(project.id).then(function (records) {

        records.forEach(function (rec) {

            });
          }

        live.sort(function (a, b) { return order[a.id] - order[b.id]; });

  /* =================================================================

  var Photos = (function () {
    function openFilePicker(multiple, onFiles) {
      var input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";
      input.setAttribute("capture", "environment");
      if (multiple) input.multiple = true;
      input.style.cssText = "position:fixed;left:-9999px;opacity:0";
      document.body.appendChild(input);
      input.addEventListener("change", function () {
        var files = input.files ? Array.prototype.slice.call(input.files) : [];
        if (input.parentNode) input.parentNode.removeChild(input);
        if (files.length) onFiles(files);
      });
      input.click();
    }

    function loadBitmapFallback(file) {
      return new Promise(function (resolve, reject) {
        var url = URL.createObjectURL(file);
        var img = new Image();
        img.onload = function () {
          URL.revokeObjectURL(url);
          resolve(img);
        };
        img.onerror = function () {
          URL.revokeObjectURL(url);
          reject(new Error("decode failed"));
        };
        img.src = url;
      });
    }

    function decodeBitmap(file) {
      if (typeof createImageBitmap === "function") {
        return createImageBitmap(file, { imageOrientation: "from-image" })
          .catch(function () { return createImageBitmap(file); });
      }
      return loadBitmapFallback(file);
    }

    function canvasToBlob(canvas, quality) {
      return new Promise(function (resolve) {
        canvas.toBlob(function (b) { resolve(b); }, "image/jpeg", quality);
      });
    }

    function drawScaled(source, maxEdge) {
      var w = source.width, h = source.height;
      var scale = Math.min(1, maxEdge / Math.max(w, h));
      var cw = Math.round(w * scale), ch = Math.round(h * scale);
      var canvas = document.createElement("canvas");
      canvas.width = cw;
      canvas.height = ch;
      canvas.getContext("2d").drawImage(source, 0, 0, cw, ch);
      return canvas;
    }

    function processFile(file) {
      return decodeBitmap(file).then(function (bitmap) {
        var fullCanvas = drawScaled(bitmap, 1600);
        var thumbCanvas = drawScaled(bitmap, 240);
        if (bitmap.close) bitmap.close();
        return Promise.all([
          canvasToBlob(fullCanvas, 0.8),
          canvasToBlob(thumbCanvas, 0.7)
        ]).then(function (blobs) {
          if (!blobs[0] || !blobs[1]) throw new Error("encode failed");
          return { full: blobs[0], thumb: blobs[1] };
        });
      });
    }

    function processFilesSequential(files, onProgress) {
      var i = 0, results = [];
      function next() {
        if (i >= files.length) return Promise.resolve(results);
        var file = files[i++];
        if (onProgress) onProgress(i - 1, files.length);
        return processFile(file).then(function (blobs) {
          results.push(blobs);
          return next();
        });
      }
      return next();
    }

    return { openFilePicker: openFilePicker, processFilesSequential: processFilesSequential };
  })();

  var State = (function () {
    var RT = Catalog.ROOM_TYPES;

    var self = {

    /* ---- construction helpers ---- */
    function newProject(name) {
      var now = Date.now();
      var p = {
        id: uid("p_"), name: name, createdAt: now, updatedAt: now,
        schemaVersion: SCHEMA_VERSION,
        rooms: [], lines: {}, priceOverrides: {}, customItems: {},

      // Singletons first, then one of each default multi room.
      Catalog.SINGLETON_TYPES.forEach(function (t) { addRoomTo(p, t); });
      ["bathroom", "bedroom", "living"].forEach(function (t) { addRoomTo(p, t); });
      return p;
    }

    // Auto-label multi rooms "Bathroom 1", "Bathroom 2", ... avoiding collisions
    // even after removals/renames.
    function nextRoomLabel(p, type) {
      var base = RT[type].label;
      var same = p.rooms.filter(function (r) { return r.type === type; });
      var re = new RegExp("^" + escapeRegex(base) + "\\s+(\\d+)$");
      var max = 0;
      same.forEach(function (r) {

        if (m) max = Math.max(max, parseInt(m[1], 10));
      });
      var n = Math.max(max + 1, same.length + 1);
      var label = base + " " + n;
      while (same.some(function (r) { return r.label === label; })) { n++; label = base + " " + n; }
      return label;
    }

    function addRoomTo(p, type) {
      var rt = RT[type];
      var label = rt.multi ? nextRoomLabel(p, type) : rt.label;
      var room = { id: uid("r_"), type: type, label: label };

    function ensureLine(p, roomId, groupId, itemId) {

      }
      if (!self.activeProject()) {
        self.root.activeProjectId = self.root.projects[0] ? self.root.projects[0].id : null;
      }
      self.ui.screen = "rooms";
      self.ui.roomId = null;
    };

    function seed() {
      var standardPrices = {};
      Object.keys(Catalog.CATALOG).forEach(function (id) {
        standardPrices[id] = Catalog.CATALOG[id].cost;
      });
      var root = { schemaVersion: SCHEMA_VERSION, standardPrices: standardPrices, projects: [], activeProjectId: null };
      var p = newProject("Property 1");
      root.projects.push(p);
      root.activeProjectId = p.id;
      return root;
    }

    /* ---- accessors ---- */
    self.activeProject = function () {
      return self.root.projects.find(function (p) { return p.id === self.root.activeProjectId; }) || null;
    };
    self.currentRoom = function () {
      var p = self.activeProject();
      if (!p) return null;
      return p.rooms.find(function (r) { return r.id === self.ui.roomId; }) || null;
    };
    self.standardPrices = function () { return self.root.standardPrices; };

    /* ---- persistence ---- */
    function touch(p) { if (p) p.updatedAt = Date.now(); self.scheduleSave(); }
    self.scheduleSave = function () {
      clearTimeout(self._saveTimer);
      self._saveTimer = setTimeout(function () { Store.save(self.root); }, 500);
    };
    self.flush = function () { clearTimeout(self._saveTimer); Store.save(self.root); };

    /* ---- project mutations ---- */
    self.createProject = function (name) {
      var p = newProject(name);
      self.root.projects.push(p);
      self.root.activeProjectId = p.id;
      self.ui.roomId = null;
      touch(p);
      return p;
    };
    self.renameProject = function (id, name) {
      var p = self.root.projects.find(function (x) { return x.id === id; });
      if (p) { p.name = name; touch(p); }
    };
    self.deleteProject = function (id) {
      return Store.deletePhotosForProject(id).catch(function () {}).then(function () {
        self.root.projects = self.root.projects.filter(function (p) { return p.id !== id; });
        if (self.root.projects.length === 0) {
          var np = newProject("Property 1");
          self.root.projects.push(np);
          self.root.activeProjectId = np.id;
        } else if (self.root.activeProjectId === id) {
          self.root.activeProjectId = self.root.projects[0].id;
        }
        self.scheduleSave();
      });
    };
    self.switchProject = function (id) {
      self.root.activeProjectId = id;
      self.ui.roomId = null;
      self.scheduleSave();
    };

    /* ---- room mutations ---- */
    self.addRoom = function (type) {
      var p = self.activeProject();
      var room = addRoomTo(p, type);
      touch(p);
      return room;
    };
    self.removeRoom = function (roomId) {
      var p = self.activeProject();
      p.rooms = p.rooms.filter(function (r) { return r.id !== roomId; });
      var prefix = roomId + ":";
      Object.keys(p.lines).forEach(function (k) { if (k.indexOf(prefix) === 0) delete p.lines[k]; });
      Object.keys(p.groupState).forEach(function (k) { if (k.indexOf(prefix) === 0) delete p.groupState[k]; });
      // Drop photo metadata tied to lines in this room AND delete the backing
      // IndexedDB records, otherwise they linger as orphans (ghost gallery
      // entries and stray files in the export ZIP).
      if (p.photos) {
        var removedIds = [];
        p.photos = p.photos.filter(function (ph) {
          if (!ph.lineKey || ph.lineKey.indexOf(prefix) !== 0) return true;
          removedIds.push(ph.id);
          return false;
        });
        // Fire-and-forget: don't block the UI on IDB deletes.
        removedIds.forEach(function (id) {
          Store.deletePhoto(id).catch(function (err) {
            console.warn("Failed to delete photo record " + id + ":", err);
          });
        });
      }
      touch(p);
    };
    self.renameRoom = function (roomId, label) {
      var p = self.activeProject();
      var r = p.rooms.find(function (x) { return x.id === roomId; });
      if (r) { r.label = label; touch(p); }
    };

    /* ---- line mutations ---- */
    self.toggleLine = function (roomId, groupId, itemId, checked) {
      var p = self.activeProject();
      var l = ensureLine(p, roomId, groupId, itemId);
      l.checked = checked;
      if (checked) {
        var gs = p.groupState[groupKey(roomId, groupId)];
        if (gs) gs.noAction = false;
      }
      touch(p);
    };
    self.setQty = function (roomId, groupId, itemId, raw) {
      var p = self.activeProject();
      var l = ensureLine(p, roomId, groupId, itemId);
      var n = parseFloat(raw);
      l.qty = (isNaN(n) || n < 0) ? 0 : n;
      touch(p);
    };

    /* ---- group mutations ---- */
    self.toggleNoAction = function (roomId, groupId) {
      var p = self.activeProject();
      var gs = ensureGroup(p, roomId, groupId);
      gs.noAction = !gs.noAction;
      if (gs.noAction) {
        Calc.groupItemIds(p, groupId).forEach(function (id) {
          var l = p.lines[lineKey(roomId, groupId, id)];
          if (l) l.checked = false;
        });
      }
      touch(p);
    };

    /* ---- price mutations ---- */
    self.setPriceOverride = function (itemId, cost) {
      var p = self.activeProject();
      p.priceOverrides[itemId] = cost;
      touch(p);
    };
    self.revertOverride = function (itemId) {
      var p = self.activeProject();
      delete p.priceOverrides[itemId];
      touch(p);
    };
    self.setStandardPrice = function (itemId, cost) {
      // Global across all projects.
      self.root.standardPrices[itemId] = cost;
      touch(self.activeProject());
    };
    self.setCustomCost = function (itemId, cost) {
      var p = self.activeProject();
      if (p.customItems[itemId]) { p.customItems[itemId].cost = cost; touch(p); }
    };

    /* ---- item add/remove ---- */
    self.addCustomItem = function (groupId, def) {
      var p = self.activeProject();
      var id = uid("cst_");
      p.customItems[id] = { name: def.name, cost: def.cost, unit: def.unit, groupId: groupId };
      touch(p);
      return id;
    };
    self.removeItem = function (itemId) {
      var p = self.activeProject();
      if (p.customItems[itemId]) {
        delete p.customItems[itemId];               // custom item: delete outright
      } else if (p.removedItemIds.indexOf(itemId) === -1) {
        p.removedItemIds.push(itemId);              // default item: hide it
      }
      // Clean up any per-room line state for this item across the project.
      Object.keys(p.lines).forEach(function (k) {
        var parsed = parseLineKey(k);
        if (parsed && parsed[2] === itemId) delete p.lines[k];
      });
      delete p.priceOverrides[itemId];
      touch(p);
    };

    /* ---- photo mutations ---- */
    self.photoCountForLine = function (lineKeyStr) {
      var p = self.activeProject();
      if (!p || !p.photos) return 0;
      return p.photos.filter(function (ph) { return ph.lineKey === lineKeyStr; }).length;
    };

    self.addPhotos = function (files, opts) {
      opts = opts || {};
      var p = self.activeProject();
      if (!p || !files.length) return Promise.resolve([]);
      if (!p.photos) p.photos = [];
      var projectId = p.id;
      var defaultLabel = opts.label || "Project photo";
      var lineKeyStr = opts.lineKey || null;

      return Photos.processFilesSequential(files).then(function (blobsList) {
        var added = [];
        return blobsList.reduce(function (chain, blobs) {
          return chain.then(function () {
            var id = uid("ph_");
            var meta = {
              id: id, label: defaultLabel, lineKey: lineKeyStr, createdAt: Date.now()
            };
            var record = {
              id: id, projectId: projectId, full: blobs.full, thumb: blobs.thumb,
              label: meta.label, lineKey: lineKeyStr, createdAt: meta.createdAt
            };
            return Store.savePhoto(record).then(function () {
              p.photos.push(meta);
              added.push(meta);
              touch(p);
            }).catch(function () {
              throw new Error("save failed");
            });
          });
        }, Promise.resolve()).then(function () { return added; });
      });
    };

    self.deletePhoto = function (photoId) {
      var p = self.activeProject();
      if (!p || !p.photos) return Promise.resolve();
      return Store.deletePhoto(photoId).then(function () {
        p.photos = p.photos.filter(function (ph) { return ph.id !== photoId; });
        touch(p);
      });
    };

    self.updatePhotoLabel = function (photoId, label) {
      var p = self.activeProject();
      if (!p || !p.photos) return Promise.resolve();
      var meta = p.photos.find(function (ph) { return ph.id === photoId; });
      if (!meta) return Promise.resolve();
      meta.label = label;
      touch(p);
      return Store.getPhoto(photoId).then(function (rec) {
        if (!rec) return;
        rec.label = label;
        return Store.savePhoto(rec);
      });
    };

    return self;
  })();

  /* =================================================================
   * 4) CALC — pure functions only (no DOM, no storage). Unit-testable.
   *    Reads static Catalog constants + the project/standardPrices args.
   * ================================================================= */
  var Calc = (function () {
    var CATALOG = Catalog.CATALOG, GROUPS = Catalog.GROUPS, RT = Catalog.ROOM_TYPES;

    // Item definition, whether a catalog default or a project custom item.
    function itemDef(project, itemId) {
      if (CATALOG[itemId]) {
        return { id: itemId, name: CATALOG[itemId].name, unit: CATALOG[itemId].unit,
                 base: CATALOG[itemId].cost, custom: false };
      }
      var c = project.customItems[itemId];
      if (c) return { id: itemId, name: c.name, unit: c.unit, base: c.cost, custom: true, groupId: c.groupId };
      return { id: itemId, name: "(unknown)", unit: "", base: 0, custom: false };
    }

    // Price resolution order: project override -> standardPrices -> CATALOG/custom default.
    function effectiveCost(project, standardPrices, itemId) {
      if (hasOwn(project.priceOverrides, itemId)) return project.priceOverrides[itemId];
      if (standardPrices[itemId] != null) return standardPrices[itemId];
      if (project.customItems[itemId]) return project.customItems[itemId].cost;
      if (CATALOG[itemId]) return CATALOG[itemId].cost;
      return 0;
    }
    // The "standard" (non-override) cost, for the revert / override display.
    function standardCost(project, standardPrices, itemId) {
      if (standardPrices[itemId] != null) return standardPrices[itemId];
      if (project.customItems[itemId]) return project.customItems[itemId].cost;
      if (CATALOG[itemId]) return CATALOG[itemId].cost;
      return 0;
    }

    // Items shown in a group instance = catalog items (minus removed) + customs.
    function groupItemIds(project, groupId) {
      var base = (GROUPS[groupId].itemIds || []).filter(function (id) {
        return project.removedItemIds.indexOf(id) === -1;
      });
      var customs = Object.keys(project.customItems).filter(function (id) {
        return project.customItems[id].groupId === groupId;
      });
      return base.concat(customs);
    }

    // Line total = qty x effective cost, only when checked and qty > 0.
    function lineTotal(project, standardPrices, lineKeyStr) {
      var ls = project.lines[lineKeyStr];
      if (!ls || !ls.checked || !(ls.qty > 0)) return 0;
      var parsed = parseLineKey(lineKeyStr);
      if (!parsed) return 0;
      return round2(ls.qty * effectiveCost(project, standardPrices, parsed[2]));
    }

    function groupSubtotal(project, standardPrices, roomId, groupId) {
      return round2(groupItemIds(project, groupId).reduce(function (s, id) {
        return s + lineTotal(project, standardPrices, lineKey(roomId, groupId, id));
      }, 0));
    }
    function roomSubtotal(project, standardPrices, room) {
      var prefix = room.id + ":";
      return round2(Object.keys(project.lines).reduce(function (s, k) {
        if (k.indexOf(prefix) !== 0) return s;
        return s + lineTotal(project, standardPrices, k);
      }, 0));
    }
    function grandTotal(project, standardPrices) {
      return round2(project.rooms.reduce(function (s, room) {
        return s + roomSubtotal(project, standardPrices, room);
      }, 0));
    }

    // A group is complete if noAction is set OR at least one item is checked.
    function isGroupComplete(project, roomId, groupId) {
      var gs = project.groupState[groupKey(roomId, groupId)];
      if (gs && gs.noAction) return true;
      return groupItemIds(project, groupId).some(function (id) {
        var ls = project.lines[lineKey(roomId, groupId, id)];
        return !!(ls && ls.checked);
      });
    }
    function roomProgress(project, room) {
      var groups = RT[room.type].groups, complete = 0;
      groups.forEach(function (g) { if (isGroupComplete(project, room.id, g)) complete++; });
      return { complete: complete, total: groups.length };
    }
    // Denominator = total group instances across all rooms (a bathroom adds 4,
    // a bedroom adds 4, ...).
    function projectProgress(project) {
      var complete = 0, total = 0;
      project.rooms.forEach(function (room) {
        var rp = roomProgress(project, room);
        complete += rp.complete; total += rp.total;
      });
      return { complete: complete, total: total, pct: total ? Math.round(complete / total * 100) : 0 };
    }

    // The ONE definition of room display order (TYPE_ORDER stable sort),
    // shared by the UI and the exporter so screen and spreadsheet agree.
    function displayRooms(project) {
      return project.rooms.slice().sort(function (a, b) {
        return Catalog.TYPE_ORDER.indexOf(a.type) - Catalog.TYPE_ORDER.indexOf(b.type);
      });
    }

    // Plain-data enumeration of every checked line — the export builds on this.
    function enumerateLines(project, standardPrices) {
      var out = [];
      displayRooms(project).forEach(function (room) {
        RT[room.type].groups.forEach(function (gid) {
          groupItemIds(project, gid).forEach(function (id) {
            var lk = lineKey(room.id, gid, id);
            var ls = project.lines[lk];
            if (ls && ls.checked && ls.qty > 0) {
              var def = itemDef(project, id);
              var cost = effectiveCost(project, standardPrices, id);
              out.push({
                roomId: room.id, roomLabel: room.label, groupId: gid,
                groupLabel: GROUPS[gid] ? GROUPS[gid].label : gid,
                overridden: hasOwn(project.priceOverrides, id),
                lineKey: lk, itemId: id, name: def.name,
                unit: def.unit, qty: ls.qty, cost: cost, total: round2(ls.qty * cost)
              });
            }
          });
        });
      });
      return out;
    }

    return {
      itemDef: itemDef, effectiveCost: effectiveCost, standardCost: standardCost,
      groupItemIds: groupItemIds, lineTotal: lineTotal,
      groupSubtotal: groupSubtotal, roomSubtotal: roomSubtotal, grandTotal: grandTotal,
      isGroupComplete: isGroupComplete, roomProgress: roomProgress,
      projectProgress: projectProgress, displayRooms: displayRooms,
      enumerateLines: enumerateLines
    };
  })();

  /* =================================================================
   * 4b) EXPORTER — styled Excel workbook + photos, zipped. Uses the
   *     vendor libs (xlsx-js-style, JSZip) loaded from disk; async.
   * ================================================================= */
  var Exporter = (function () {
    var available = !!(window.XLSX && window.JSZip);
    if (!available) {
      console.warn("Export unavailable — vendor files missing (expected vendor/xlsx.bundle.js and vendor/jszip.min.js).");
    }

    var C = {
      teal: "0F3B46", green: "1F8F66", headTint: "E2EEF1", subTint: "E3F3EC",
      metaTint: "F5F8FA", text: "17242E", muted: "74889A", white: "FFFFFF",
      border: "C6D2DB"
    };
    var CURRENCY = '"$"#,##0.00';

    function pad2(n) { return (n < 10 ? "0" : "") + n; }

    // Filesystem-safe names: strip reserved chars, collapse whitespace,
    // cap length, never empty.
    function sanitizeName(s, fallback) {
      s = String(s == null ? "" : s)
        .replace(/[\/\\:*?"<>|]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
      if (s.length > 60) s = s.slice(0, 60).trim();
      return s || fallback;
    }

    function thinBorder() {
      var edge = { style: "thin", color: { rgb: C.border } };
      return { top: edge, bottom: edge, left: edge, right: edge };
    }
    function solidFill(rgb) { return { patternType: "solid", fgColor: { rgb: rgb } }; }

    function buildWorkbook(project, standardPrices) {
      var lines = Calc.enumerateLines(project, standardPrices);
      var anyOverride = lines.some(function (l) { return l.overridden; });

      var rows = [];      // array of arrays of cell objects (sparse ok)
      var merges = [];
      var rowHeights = [];

      function push(cells, hpt) {
        rowHeights.push(hpt ? { hpt: hpt } : {});
        rows.push(cells);
        return rows.length - 1;
      }
      // Merged band: style every covered cell so the fill spans the range.
      function bandRow(text, style, hpt, mergeTo) {
        var cells = [];
        for (var c = 0; c < 6; c++) cells.push({ v: c === 0 ? text : "", t: "s", s: style });
        var r = push(cells, hpt);
        merges.push({ s: { r: r, c: 0 }, e: { r: r, c: mergeTo == null ? 5 : mergeTo } });
        return r;
      }

      // Title
      bandRow("REPAIRTALLY \u2014 REPAIR ESTIMATE", {
        font: { bold: true, sz: 14, color: { rgb: C.white } },
        fill: solidFill(C.teal),
        alignment: { horizontal: "left", vertical: "center" }
      }, 28);

      // Meta
      var longDate = new Date().toLocaleDateString(undefined, {
        year: "numeric", month: "long", day: "numeric"
      });
      bandRow("Property: " + project.name + "    Date: " + longDate, {
        font: { sz: 10, color: { rgb: C.muted } },
        fill: solidFill(C.metaTint),
        alignment: { horizontal: "left", vertical: "center" }
      }, 18);

      push([]); // blank

      var HEADERS = ["Repair Item", "Group", "Unit", "Unit Cost", "Qty", "Line Total"];
      var headStyle = function (right) {
        return {
          font: { bold: true, color: { rgb: C.text } },
          fill: solidFill(C.headTint),
          border: thinBorder(),
          alignment: { horizontal: right ? "right" : "left", vertical: "center" }
        };
      };

      Calc.displayRooms(project).forEach(function (room) {
        var roomLines = lines.filter(function (l) { return l.roomId === room.id; });
        if (!roomLines.length) return;

        // Room header
        bandRow(room.label, {
          font: { bold: true, color: { rgb: C.white } },
          fill: solidFill(C.green),
          alignment: { horizontal: "left", vertical: "center" }
        }, 20);

        // Column headers
        push(HEADERS.map(function (h, i) {
          return { v: h, t: "s", s: headStyle(i >= 3) };
        }), 18);

        // Lines (enumeration order keeps groups contiguous)
        roomLines.forEach(function (l) {
          push([
            { v: l.name + (l.overridden ? "*" : ""), t: "s",
              s: { font: { color: { rgb: C.text } }, border: thinBorder() } },
            { v: l.groupLabel, t: "s",
              s: { font: { sz: 10, color: { rgb: C.muted } }, border: thinBorder() } },
            { v: l.unit, t: "s",
              s: { font: { color: { rgb: C.text } }, border: thinBorder() } },
            { v: l.cost, t: "n",
              s: { numFmt: CURRENCY, font: { color: { rgb: C.text } }, border: thinBorder(),
                   alignment: { horizontal: "right" } } },
            { v: l.qty, t: "n",
              s: { font: { color: { rgb: C.text } }, border: thinBorder(),
                   alignment: { horizontal: "right" } } },
            { v: l.total, t: "n",
              s: { numFmt: CURRENCY, font: { color: { rgb: C.text } }, border: thinBorder(),
                   alignment: { horizontal: "right" } } }
          ]);
        });

        // Room subtotal
        var subtotal = round2(roomLines.reduce(function (s, l) { return s + l.total; }, 0));
        var subStyle = {
          font: { bold: true, color: { rgb: C.text } },
          fill: solidFill(C.subTint),
          alignment: { horizontal: "left", vertical: "center" }
        };
        var cells = [];
        for (var c = 0; c < 5; c++) cells.push({ v: c === 0 ? room.label + " subtotal" : "", t: "s", s: subStyle });
        cells.push({ v: subtotal, t: "n",
          s: { numFmt: CURRENCY, font: { bold: true, color: { rgb: C.text } },
               fill: solidFill(C.subTint), alignment: { horizontal: "right" } } });
        var r = push(cells, 18);
        merges.push({ s: { r: r, c: 0 }, e: { r: r, c: 4 } });

        push([]); // blank
      });

      // Grand total — MUST equal Calc.grandTotal: sum the enumeration totals,
      // never re-derive with independent logic.
      var grand = round2(lines.reduce(function (s, l) { return s + l.total; }, 0));
      var gtStyle = {
        font: { bold: true, sz: 13, color: { rgb: C.white } },
        fill: solidFill(C.teal),
        alignment: { horizontal: "left", vertical: "center" }
      };
      var gtCells = [];
      for (var gc = 0; gc < 5; gc++) gtCells.push({ v: gc === 0 ? "TOTAL ESTIMATE" : "", t: "s", s: gtStyle });
      gtCells.push({ v: grand, t: "n",
        s: { numFmt: CURRENCY, font: { bold: true, sz: 13, color: { rgb: C.white } },
             fill: solidFill(C.teal), alignment: { horizontal: "right", vertical: "center" } } });
      var gtRow = push(gtCells, 24);
      merges.push({ s: { r: gtRow, c: 0 }, e: { r: gtRow, c: 4 } });

      if (anyOverride) {
        bandRow("* unit cost adjusted for this project (standard price list otherwise)", {
          font: { sz: 10, italic: true, color: { rgb: C.muted } },
          alignment: { horizontal: "left" }
        }, 16);
      }

      // Sparse cell matrix -> worksheet
      var ws = {};
      rows.forEach(function (cellsRow, rr) {
        cellsRow.forEach(function (cell, cc) {
          if (cell) ws[XLSX.utils.encode_cell({ r: rr, c: cc })] = cell;
        });
      });
      ws["!ref"] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: rows.length - 1, c: 5 } });
      ws["!merges"] = merges;
      ws["!cols"] = [{ wch: 40 }, { wch: 22 }, { wch: 14 }, { wch: 12 }, { wch: 12 }, { wch: 12 }];
      ws["!rows"] = rowHeights;

      var wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Estimate");
      return wb;
    }

    function exportProject(project, standardPrices) {
      return Promise.resolve().then(function () {
        var wb = buildWorkbook(project, standardPrices);
        var xlsxData = XLSX.write(wb, { bookType: "xlsx", type: "array" });

        var zip = new JSZip();
        zip.file("estimate.xlsx", xlsxData);

        // Photos: metadata-filtered records (Task 0a), in metadata order,
        // full-size blobs, 2-digit index prefix so duplicate labels never collide.
        return Store.getLivePhotosForProject(project)
          .catch(function (err) {
            console.warn("Export: could not read photos, continuing without:", err);
            return [];
          })
          .then(function (records) {
            if (records.length) {
              var folder = zip.folder("photos");
              records.forEach(function (rec, i) {
                var name = pad2(i + 1) + "-" + sanitizeName(rec.label, "photo") + ".jpg";
                folder.file(name, rec.full);
              });
            }
            return zip.generateAsync({ type: "blob", mimeType: "application/zip" });
          })
          .then(function (blob) {
            var d = new Date();
            var ymd = d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
            var filename = "Estimate - " + sanitizeName(project.name, "estimate") + " - " + ymd + ".zip";
            return { blob: blob, filename: filename };
          });
      });
    }

    return { available: available, exportProject: exportProject, sanitizeName: sanitizeName };
  })();

  /* =================================================================
   * 5) UI — rendering. Full re-render for structural changes; targeted
   *    in-place updates for qty keystrokes (see refreshTotals).
   * ================================================================= */
  var UI = (function () {
    var RT = Catalog.ROOM_TYPES, GROUPS = Catalog.GROUPS;
    var app = document.getElementById("app");
    var modalRoot = document.getElementById("modal-root");
    var _objectUrls = [];
    var _viewerUrl = null;

    function sp() { return State.standardPrices(); }

    function trackUrl(url) { _objectUrls.push(url); return url; }
    function revokeAllUrls() {
      _objectUrls.forEach(function (u) { URL.revokeObjectURL(u); });
      _objectUrls = [];
      if (_viewerUrl) { URL.revokeObjectURL(_viewerUrl); _viewerUrl = null; }
    }

    /* ---------- header ---------- */
    function headerHTML(project, leftAction, leftLabel) {
      var gt = Calc.grandTotal(project, sp());
      var pr = Calc.projectProgress(project);
      return '' +
        '<header class="appbar">' +
          '<div class="appbar-row">' +
            '<button class="btn-ghost" data-action="' + leftAction + '">' + esc(leftLabel) + '</button>' +
            '<div class="appbar-title">' +
              '<div class="proj-name">' + esc(project.name) + '</div>' +
              '<div class="proj-sub">Repair Estimate</div>' +
            '</div>' +
            (Exporter.available
              ? '<button class="btn-ghost" data-action="export" data-role="export-btn">Export</button>'
              : '<button class="btn-ghost" data-action="export" data-role="export-btn" disabled title="Export unavailable \u2014 vendor files missing">Export</button>') +
          '</div>' +
          '<div class="appbar-row totals-row">' +
            '<div class="grand" data-role="grand-total">' + fmt(gt) + '</div>' +
            '<div class="progress-wrap">' +
              '<div class="progress-bar"><span style="width:' + pr.pct + '%"></span></div>' +
              '<div class="progress-label">' + pr.complete + '/' + pr.total + ' groups &middot; ' + pr.pct + '%</div>' +
            '</div>' +
          '</div>' +
        '</header>';
    }

    /* ---------- projects screen ---------- */
    function projectsHTML() {
      var active = State.root.activeProjectId;
      var cards = State.root.projects.map(function (p) {
        var total = Calc.grandTotal(p, sp());
        return '' +
          '<li class="proj-card' + (p.id === active ? ' is-active' : '') + '" data-action="open-project" data-project-id="' + p.id + '">' +
            '<div class="proj-card-main">' +
              '<div class="proj-card-name">' + esc(p.name) + '</div>' +
              '<div class="proj-card-meta">' + p.rooms.length + ' rooms &middot; ' + fmt(total) + ' &middot; saved ' + esc(fmtTime(p.updatedAt)) + '</div>' +
            '</div>' +
            '<div class="proj-card-actions">' +
              '<button class="icon-btn" data-action="rename-project" data-project-id="' + p.id + '" aria-label="Rename project">&#9998;</button>' +
              '<button class="icon-btn danger" data-action="delete-project" data-project-id="' + p.id + '" aria-label="Delete project">&#128465;</button>' +
            '</div>' +
          '</li>';
      }).join("");
      return '' +
        '<header class="appbar">' +
          '<div class="appbar-row">' +
            '<div class="appbar-title">' +
              '<div class="proj-name">Projects</div>' +
              '<div class="proj-sub">Repair Cost Estimator</div>' +
            '</div>' +
            '<button class="btn-primary" data-action="new-project">+ New</button>' +
          '</div>' +
        '</header>' +
        '<main class="screen">' +
          '<div class="section-head">Your properties</div>' +
          '<ul class="proj-list">' + cards + '</ul>' +
        '</main>';
    }

    /* ---------- room list screen ---------- */
    function sortedRooms(project) {
      // Delegate to Calc so screen and export share one room order.
      return Calc.displayRooms(project);
    }
    function roomCardHTML(project, room) {
      var subtotal = Calc.roomSubtotal(project, sp(), room);
      var rp = Calc.roomProgress(project, room);
      var pct = rp.total ? Math.round(rp.complete / rp.total * 100) : 0;
      var multi = RT[room.type].multi;
      var controls = multi
        ? '<button class="icon-btn" data-action="rename-room" data-room-id="' + room.id + '" aria-label="Rename room">&#9998;</button>' +
          '<button class="icon-btn danger" data-action="remove-room" data-room-id="' + room.id + '" aria-label="Remove room">&#128465;</button>'
        : '';
      return '' +
        '<li class="room-card" data-action="open-room" data-room-id="' + room.id + '">' +
          '<div class="room-card-top">' +
            '<div class="room-card-name">' + esc(room.label) + '</div>' +
            '<div class="room-card-total">' + fmt(subtotal) + '</div>' +
          '</div>' +
          '<div class="room-card-bottom">' +
            '<div class="mini-progress"><span style="width:' + pct + '%"></span></div>' +
            '<div class="room-card-meta">' + rp.complete + '/' + rp.total + ' groups</div>' +
            controls +
          '</div>' +
        '</li>';
    }
    function roomListHTML(project) {
      var cards = sortedRooms(project).map(function (r) { return roomCardHTML(project, r); }).join("");
      return headerHTML(project, "go-projects", "\u2039 Projects") +
        '<main class="screen">' +
          '<div class="section-head">Rooms &middot; tap to add repairs</div>' +
          '<ul class="room-list">' + cards + '</ul>' +
          '<div class="add-room-bar">' +
            '<button class="btn-add" data-action="add-room" data-room-type="bathroom">+ Bathroom</button>' +
            '<button class="btn-add" data-action="add-room" data-room-type="bedroom">+ Bedroom</button>' +
            '<button class="btn-add" data-action="add-room" data-room-type="living">+ Living / Common</button>' +
          '</div>' +
          '<section class="photo-section" id="photo-section">' +
            '<div class="photo-section-head">' +
              '<div class="photo-section-title">Photos</div>' +
              '<button class="btn-secondary" data-action="add-project-photo">+ Add photo</button>' +
            '</div>' +
            '<div class="photo-gallery is-empty" id="photo-gallery" data-role="photo-gallery">No photos yet</div>' +
            '<div id="photo-status"></div>' +
          '</section>' +
        '</main>';
    }

    /* ---------- room detail screen ---------- */
    function lineHTML(project, room, groupId, itemId, noAction) {
      var def = Calc.itemDef(project, itemId);
      var lk = lineKey(room.id, groupId, itemId);
      var ls = project.lines[lk] || { checked: false, qty: 0 };
      var eff = Calc.effectiveCost(project, sp(), itemId);
      var overridden = hasOwn(project.priceOverrides, itemId);
      var total = Calc.lineTotal(project, sp(), lk);
      var qtyDisabled = noAction || !ls.checked;
      var photoCount = State.photoCountForLine(lk);
      var badge = photoCount > 0
        ? '<span class="badge">' + photoCount + '</span>' : '';
      return '' +
        '<div class="line' + (ls.checked ? ' is-checked' : '') + (noAction ? ' is-disabled' : '') + '"' +
             ' data-line-key="' + esc(lk) + '" data-item-id="' + esc(itemId) + '" data-room-id="' + room.id + '" data-group-id="' + esc(groupId) + '">' +
          '<input class="line-check" type="checkbox" data-role="check" data-room-id="' + room.id + '" data-group-id="' + esc(groupId) + '" data-item-id="' + esc(itemId) + '"' +
                 (ls.checked ? " checked" : "") + (noAction ? " disabled" : "") + ' aria-label="Include ' + esc(def.name) + '">' +
          '<div class="line-main">' +
            '<div class="line-name">' + esc(def.name) + (def.custom ? ' <span class="tag">custom</span>' : '') + '</div>' +
          '</div>' +
          '<button class="icon-btn line-cam" data-action="add-line-photo" data-line-key="' + esc(lk) + '" data-item-id="' + esc(itemId) + '"' +
                  ' data-room-id="' + room.id + '" data-group-id="' + esc(groupId) + '" aria-label="Add photo for ' + esc(def.name) + '">' +
            '&#128247;' + badge +
          '</button>' +
          '<input class="qty" type="number" inputmode="decimal" min="0" step="any" data-role="qty"' +
                 ' data-room-id="' + room.id + '" data-group-id="' + esc(groupId) + '" data-item-id="' + esc(itemId) + '" data-line-key="' + esc(lk) + '"' +
                 ' value="' + (ls.qty > 0 ? esc(ls.qty) : "") + '" placeholder="0"' + (qtyDisabled ? " disabled" : "") + ' aria-label="Quantity">' +
          '<div class="line-total" data-role="line-total" data-line-key="' + esc(lk) + '">' + (total > 0 ? fmt(total) : "\u2014") + '</div>' +
          '<div class="line-sub">' +
            '<button class="price-btn' + (overridden ? " is-override" : "") + '" data-action="edit-price" data-item-id="' + esc(itemId) + '"' + (noAction ? " disabled" : "") + '>' +
              fmt(eff) + (overridden ? ' <span class="dot"></span>' : '') +
            '</button>' +
            '<span class="unit">/ ' + esc(def.unit) + '</span>' +
          '</div>' +
          '<button class="icon-btn del" data-action="delete-line" data-item-id="' + esc(itemId) + '" data-room-id="' + room.id + '" aria-label="Delete ' + esc(def.name) + '">&times;</button>' +
        '</div>';
    }
    function addItemRowHTML(room, groupId) {
      return '' +
        '<div class="add-item" data-group-id="' + esc(groupId) + '" data-room-id="' + room.id + '">' +
          '<input class="ai-name" data-role="ai-name" type="text" placeholder="Add item name">' +
          '<input class="ai-cost" data-role="ai-cost" type="number" inputmode="decimal" min="0" step="any" placeholder="Cost">' +
          '<input class="ai-unit" data-role="ai-unit" type="text" placeholder="Unit">' +
          '<button class="btn-add-item" data-action="add-item" data-group-id="' + esc(groupId) + '" data-room-id="' + room.id + '">Add</button>' +
        '</div>';
    }
    function groupHTML(project, room, groupId) {
      var g = GROUPS[groupId];
      var gkey = groupKey(room.id, groupId);
      var collapsed = !!State.ui.collapsed[gkey];
      var gs = project.groupState[gkey] || { noAction: false };
      var noAction = !!gs.noAction;
      var complete = Calc.isGroupComplete(project, room.id, groupId);
      var subtotal = Calc.groupSubtotal(project, sp(), room.id, groupId);
      var items = Calc.groupItemIds(project, groupId).map(function (id) {
        return lineHTML(project, room, groupId, id, noAction);
      }).join("");
      return '' +
        '<section class="group' + (collapsed ? " is-collapsed" : "") + '" data-group-id="' + esc(groupId) + '">' +
          '<button class="group-head" data-action="toggle-group" data-room-id="' + room.id + '" data-group-id="' + esc(groupId) + '">' +
            '<span class="chev">&#9660;</span>' +
            '<span class="group-label">' + esc(g.label) + '</span>' +
            '<span class="group-badge' + (complete ? " is-done" : "") + '">&#10003;</span>' +
            '<span class="group-subtotal" data-role="group-subtotal" data-group-key="' + esc(gkey) + '">' + fmt(subtotal) + '</span>' +
          '</button>' +
          '<div class="group-body">' +
            '<label class="no-action-row">' +
              '<input type="checkbox" data-role="no-action" data-room-id="' + room.id + '" data-group-id="' + esc(groupId) + '"' + (noAction ? " checked" : "") + '>' +
              '<span>No action needed</span>' +
            '</label>' +
            items +
            addItemRowHTML(room, groupId) +
          '</div>' +
        '</section>';
    }
    function roomDetailHTML(project, room) {
      var rp = Calc.roomProgress(project, room);
      var subtotal = Calc.roomSubtotal(project, sp(), room);
      var groups = RT[room.type].groups.map(function (gid) {
        return groupHTML(project, room, gid);
      }).join("");
      return headerHTML(project, "back-to-rooms", "\u2039 Rooms") +
        '<main class="screen" id="room-view">' +
          '<div class="room-detail-head">' +
            '<div class="rd-title">' + esc(room.label) + '</div>' +
            '<div class="rd-sub"><span data-role="room-subtotal">' + fmt(subtotal) + '</span> &middot; ' + rp.complete + '/' + rp.total + ' groups</div>' +
          '</div>' +
          '<div id="groups">' + groups + '</div>' +
        '</main>';
    }

    /* ---------- photo gallery + viewer ---------- */
    function showPhotoStatus(html) {
      var el = document.getElementById("photo-status");
      if (el) el.innerHTML = html;
    }
    function showPhotoError(msg) {
      showPhotoStatus('<div class="photo-error">' + esc(msg) + '</div>');
      setTimeout(function () { showPhotoStatus(""); }, 5000);
    }

    function renderPhotoGallery(records) {
      var gallery = document.getElementById("photo-gallery");
      if (!gallery) return;
      if (!records.length) {
        gallery.className = "photo-gallery is-empty";
        gallery.innerHTML = "No photos yet";
        return;
      }
      gallery.className = "photo-gallery";
      gallery.innerHTML = records.map(function (rec) {
        var url = trackUrl(URL.createObjectURL(rec.thumb));
        return '' +
          '<button class="photo-thumb" data-action="open-photo" data-photo-id="' + esc(rec.id) + '" aria-label="' + esc(rec.label) + '">' +
            '<img src="' + url + '" alt="">' +
            '<span class="photo-thumb-label">' + esc(rec.label) + '</span>' +
          '</button>';
      }).join("");
    }

    function hydratePhotoGallery(project) {
      if (!project) {
        renderPhotoGallery([]);
        return Promise.resolve();
      }
      // getLivePhotosForProject filters to metadata-backed records (and cleans
      // orphans) even when project.photos is empty, so ghosts never render.
      return Store.getLivePhotosForProject(project).then(function (records) {
        renderPhotoGallery(records);
      }).catch(function () {
        renderPhotoGallery([]);
      });
    }

    function openPhotoViewer(photoId) {
      Store.getPhoto(photoId).then(function (rec) {
        if (!rec) return;
        if (_viewerUrl) URL.revokeObjectURL(_viewerUrl);
        _viewerUrl = URL.createObjectURL(rec.full);
        modalRoot.innerHTML = '' +
          '<div class="viewer-backdrop" data-role="viewer">' +
            '<div class="viewer-top">' +
              '<button class="btn-ghost" data-action="close-viewer">Close</button>' +
              '<div class="viewer-title">' + esc(rec.label) + '</div>' +
            '</div>' +
            '<div class="viewer-img-wrap"><img src="' + _viewerUrl + '" alt=""></div>' +
            '<label class="viewer-label"><span>Label</span>' +
              '<input id="viewer-label-input" type="text" value="' + esc(rec.label) + '" data-photo-id="' + esc(photoId) + '"></label>' +
            '<div class="viewer-actions">' +
              '<button class="btn-secondary" data-action="save-photo-label" data-photo-id="' + esc(photoId) + '">Save label</button>' +
              '<button class="btn-danger" data-action="delete-photo" data-photo-id="' + esc(photoId) + '">Delete</button>' +
            '</div>' +
          '</div>';
      });
    }

    function closeViewer() {
      modalRoot.innerHTML = "";
      if (_viewerUrl) { URL.revokeObjectURL(_viewerUrl); _viewerUrl = null; }
    }

    function linePhotoLabel(roomId, groupId, itemId) {
      var p = State.activeProject();
      var room = p.rooms.find(function (r) { return r.id === roomId; });
      var def = Calc.itemDef(p, itemId);
      return def.name + " \u2014 " + (room ? room.label : "");
    }

    /* ---------- top-level render ---------- */
    function render() {
      revokeAllUrls();
      var project = State.activeProject();
      var screen = State.ui.screen;
      var html;
      if (screen === "projects" || !project) {
        html = projectsHTML();
      } else if (screen === "room" && State.currentRoom()) {
        html = roomDetailHTML(project, State.currentRoom());
      } else {
        State.ui.screen = "rooms";
        html = roomListHTML(project);
      }
      // Preserve scroll on same-screen re-render; reset when navigating.
      var key = State.ui.screen + ":" + State.ui.roomId;
      var same = key === State._renderKey;
      var y = window.scrollY;
      app.innerHTML = html;
      State._renderKey = key;
      window.scrollTo(0, same ? y : 0);
      if (State.ui.screen === "rooms" && project) hydratePhotoGallery(project);
    }

    /* ---------- in-place total updates (qty keystrokes) ---------- */
    function refreshTotals(roomId) {
      var p = State.activeProject(), prices = sp();
      var room = p.rooms.find(function (r) { return r.id === roomId; });

      app.querySelectorAll('[data-role="line-total"]').forEach(function (el) {
        var t = Calc.lineTotal(p, prices, el.getAttribute("data-line-key"));
        el.textContent = t > 0 ? fmt(t) : "\u2014";
      });
      app.querySelectorAll('[data-role="group-subtotal"]').forEach(function (el) {
        var parts = splitAtFirstColon(el.getAttribute("data-group-key"));
        el.textContent = fmt(Calc.groupSubtotal(p, prices, parts[0], parts[1]));
      });
      var rs = app.querySelector('[data-role="room-subtotal"]');
      if (rs && room) rs.textContent = fmt(Calc.roomSubtotal(p, prices, room));
      var gt = app.querySelector('[data-role="grand-total"]');
      if (gt) gt.textContent = fmt(Calc.grandTotal(p, prices));
    }

    /* ---------- price modal ---------- */
    function openPriceModal(itemId) {
      var p = State.activeProject();
      var def = Calc.itemDef(p, itemId);
      var eff = Calc.effectiveCost(p, sp(), itemId);
      var std = Calc.standardCost(p, sp(), itemId);
      var overridden = hasOwn(p.priceOverrides, itemId);
      var standardLabel = def.custom ? "Update item price" : "Update standard price";
      modalRoot.innerHTML = '' +
        '<div class="modal-backdrop">' +
          '<div class="modal" role="dialog" aria-modal="true" aria-label="Edit price">' +
            '<div class="modal-title">Edit price</div>' +
            '<div class="modal-item">' + esc(def.name) + ' <span class="unit">/ ' + esc(def.unit) + '</span></div>' +
            '<label class="modal-field"><span>Unit cost</span>' +
              '<input id="price-input" type="number" inputmode="decimal" min="0" step="any" value="' + esc(eff) + '"></label>' +
            (overridden ? '<div class="override-note">This project uses a custom price (standard: ' + fmt(std) + ').</div>' : '') +
            '<div class="modal-actions">' +
              '<button class="btn-primary" data-action="price-save-project" data-item-id="' + esc(itemId) + '">This project only</button>' +
              '<button class="btn-secondary" data-action="price-save-standard" data-item-id="' + esc(itemId) + '">' + standardLabel + '</button>' +
            '</div>' +
            '<div class="modal-actions">' +
              (overridden ? '<button class="btn-ghost" data-action="price-revert" data-item-id="' + esc(itemId) + '">Revert to standard</button>' : '') +
              '<button class="btn-ghost" data-action="close-modal">Cancel</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      var input = document.getElementById("price-input");
      if (input) { input.focus(); input.select(); }
    }
    function closeModal() { modalRoot.innerHTML = ""; _exportResult = null; }

    /* ---------- export delivery sheet ---------- */
    var _exportResult = null; // { blob, filename } while the sheet is open

    function fmtBytes(n) {
      if (n < 1024) return n + " B";
      if (n < 1024 * 1024) return Math.round(n / 1024) + " KB";
      return (n / (1024 * 1024)).toFixed(1) + " MB";
    }

    // NOTE: iOS standalone PWAs handle silent downloads poorly; the share
    // sheet is the reliable path there and matches the field workflow of
    // sending the estimate to the team.
    function openExportSheet(result) {
      _exportResult = result;
      var canShare = false;
      try {
        var f = new File([result.blob], result.filename, { type: "application/zip" });
        canShare = !!(navigator.canShare && navigator.canShare({ files: [f] }));
      } catch (e) { canShare = false; }
      modalRoot.innerHTML = '' +
        '<div class="modal-backdrop">' +
          '<div class="modal" role="dialog" aria-modal="true" aria-label="Export ready">' +
            '<div class="modal-title">Export ready</div>' +
            '<div class="modal-item">' + esc(result.filename) + ' &middot; ' + esc(fmtBytes(result.blob.size)) + '</div>' +
            '<div class="modal-actions">' +
              '<button class="btn-primary" data-action="export-download">Download</button>' +
              (canShare ? '<button class="btn-secondary" data-action="export-share">Share\u2026</button>' : '') +
            '</div>' +
            '<div class="modal-actions">' +
              '<button class="btn-ghost" data-action="close-modal">Cancel</button>' +
            '</div>' +
            '<div id="export-sheet-status"></div>' +
          '</div>' +
        '</div>';
    }

    // Non-blocking inline error shown at the top of the current screen.
    function showExportError(msg) {
      var main = app.querySelector("main.screen");
      if (!main) return;
      var old = document.getElementById("export-error");
      if (old) old.parentNode.removeChild(old);
      var div = document.createElement("div");
      div.id = "export-error";
      div.className = "photo-error";
      div.style.marginBottom = "12px";
      div.textContent = msg;
      main.insertBefore(div, main.firstChild);
      setTimeout(function () {
        if (div.parentNode) div.parentNode.removeChild(div);
      }, 6000);
    }

    function exportSheetError(msg) {
      var el = document.getElementById("export-sheet-status");
      if (el) el.innerHTML = '<div class="photo-error">' + esc(msg) + '</div>';
    }

    function downloadExport() {
      if (!_exportResult) return;
      var url = URL.createObjectURL(_exportResult.blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = _exportResult.filename;
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      // iOS can race an immediate revoke with the download starting.
      setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
      closeModal();
    }

    function shareExport() {
      if (!_exportResult) return;
      var file = new File([_exportResult.blob], _exportResult.filename, { type: "application/zip" });
      navigator.share({ files: [file] }).then(function () {
        closeModal();
      }).catch(function (err) {
        if (err && err.name === "AbortError") return; // user cancelled: not an error
        console.error("Share failed:", err);
        exportSheetError("Share failed \u2014 try Download instead");
      });
    }
    function modalPriceValue() {
      var input = document.getElementById("price-input");
      if (!input) return null;
      var v = parseFloat(input.value);
      if (isNaN(v) || v < 0) { alert("Enter a valid cost (0 or more)."); return null; }
      return round2(v);
    }

    return {
      render: render, refreshTotals: refreshTotals,
      openPriceModal: openPriceModal, closeModal: closeModal, modalPriceValue: modalPriceValue,
      openPhotoViewer: openPhotoViewer, closeViewer: closeViewer,
      showPhotoStatus: showPhotoStatus, showPhotoError: showPhotoError,
      linePhotoLabel: linePhotoLabel, hydratePhotoGallery: hydratePhotoGallery,
      openExportSheet: openExportSheet, downloadExport: downloadExport, shareExport: shareExport,
      showExportError: showExportError
    };
  })();

  /* =================================================================
   * 6) EVENTS — delegated listeners on document.body only.
   * ================================================================= */
  var Events = (function () {
    var RT = Catalog.ROOM_TYPES;
    var _exporting = false;

    function onClick(e) {
      if (e.target.classList && e.target.classList.contains("modal-backdrop")) {
        UI.closeModal(); return;
      }
      if (e.target.classList && e.target.classList.contains("viewer-backdrop")) {
        UI.closeViewer(); return;
      }
      var t = e.target.closest("[data-action]");
      if (!t) return;
      var a = t.dataset.action;
      var d = t.dataset;
      var p = State.activeProject();

      switch (a) {
        case "go-projects":
          State.ui.screen = "projects"; UI.render(); break;

        case "open-project":
          State.switchProject(d.projectId); State.ui.screen = "rooms"; UI.render(); break;

        case "new-project": {
          var nm = prompt("New project name:", "Property " + (State.root.projects.length + 1));
          if (nm && nm.trim()) { State.createProject(nm.trim()); State.ui.screen = "rooms"; UI.render(); }
          break;
        }
        case "rename-project": {
          var proj = State.root.projects.find(function (x) { return x.id === d.projectId; });
          var nm2 = prompt("Rename project:", proj ? proj.name : "");
          if (nm2 && nm2.trim()) { State.renameProject(d.projectId, nm2.trim()); UI.render(); }
          break;
        }
        case "delete-project": {
          var proj2 = State.root.projects.find(function (x) { return x.id === d.projectId; });
          if (proj2 && confirm('Delete "' + proj2.name + '"? This cannot be undone.')) {
            State.deleteProject(d.projectId).then(function () { UI.render(); });
          }
          break;
        }

        case "open-room":
          State.ui.roomId = d.roomId; State.ui.screen = "room"; UI.render(); break;

        case "back-to-rooms":
          State.ui.screen = "rooms"; State.ui.roomId = null; UI.render(); break;

        case "add-room":
          State.addRoom(d.roomType); UI.render(); break;

        case "remove-room": {
          var room = p.rooms.find(function (r) { return r.id === d.roomId; });
          if (room && confirm('Remove "' + room.label + '"? Its selections will be deleted.')) {
            State.removeRoom(d.roomId); UI.render();
          }
          break;
        }
        case "rename-room": {
          var room2 = p.rooms.find(function (r) { return r.id === d.roomId; });
          var rl = prompt("Rename room:", room2 ? room2.label : "");
          if (rl && rl.trim()) { State.renameRoom(d.roomId, rl.trim()); UI.render(); }
          break;
        }

        case "toggle-group": {
          var gk = groupKey(d.roomId, d.groupId);
          State.ui.collapsed[gk] = !State.ui.collapsed[gk];
          UI.render();
          break;
        }

        case "edit-price":
          UI.openPriceModal(d.itemId); break;

        case "price-save-project": {
          var v1 = UI.modalPriceValue();
          if (v1 != null) { State.setPriceOverride(d.itemId, v1); UI.closeModal(); UI.render(); }
          break;
        }
        case "price-save-standard": {
          var v2 = UI.modalPriceValue();
          if (v2 != null) {
            var def = Calc.itemDef(p, d.itemId);
            if (def.custom) State.setCustomCost(d.itemId, v2);
            else State.setStandardPrice(d.itemId, v2);
            UI.closeModal(); UI.render();
          }
          break;
        }
        case "price-revert":
          State.revertOverride(d.itemId); UI.closeModal(); UI.render(); break;

        case "close-modal":
          UI.closeModal(); break;

        case "delete-line":
          if (confirm("Remove this item from the list?")) { State.removeItem(d.itemId); UI.render(); }
          break;

        case "add-item": {
          var box = t.closest(".add-item");
          var name = box.querySelector('[data-role="ai-name"]').value.trim();
          var costRaw = box.querySelector('[data-role="ai-cost"]').value;
          var unit = box.querySelector('[data-role="ai-unit"]').value.trim();
          var cost = parseFloat(costRaw);
          if (!name) { alert("Give the item a name."); break; }
          if (isNaN(cost) || cost < 0) { alert("Enter a valid cost (0 or more)."); break; }
          State.addCustomItem(d.groupId, { name: name, cost: round2(cost), unit: unit || "ea." });
          UI.render();
          break;
        }

        case "add-project-photo":
          Photos.openFilePicker(true, function (files) {
            UI.showPhotoStatus('<div class="photo-saving">Saving\u2026</div>');
            State.addPhotos(files, { label: "Project photo" }).then(function () {
              UI.showPhotoStatus("");
              UI.render();
            }).catch(function () {
              UI.showPhotoError("Photo could not be saved \u2014 storage may be full");
            });
          });
          break;

        case "add-line-photo":
          Photos.openFilePicker(true, function (files) {
            var label = UI.linePhotoLabel(d.roomId, d.groupId, d.itemId);
            UI.showPhotoStatus('<div class="photo-saving">Saving\u2026</div>');
            State.addPhotos(files, { lineKey: d.lineKey, label: label }).then(function () {
              UI.showPhotoStatus("");
              UI.render();
            }).catch(function () {
              UI.showPhotoError("Photo could not be saved \u2014 storage may be full");
            });
          });
          break;

        case "open-photo":
          UI.openPhotoViewer(d.photoId);
          break;

        case "close-viewer":
          UI.closeViewer();
          break;

        case "save-photo-label": {
          var inp = document.getElementById("viewer-label-input");
          var lbl = inp ? inp.value.trim() : "";
          if (!lbl) { alert("Enter a label."); break; }
          State.updatePhotoLabel(d.photoId, lbl).then(function () {
            UI.closeViewer();
            UI.render();
          });
          break;
        }

        case "delete-photo":
          if (confirm("Delete this photo?")) {
            State.deletePhoto(d.photoId).then(function () {
              UI.closeViewer();
              UI.render();
            });
          }
          break;

        case "export": {
          if (!Exporter.available || _exporting) break; // ignore re-taps
          var lineCount = Calc.enumerateLines(p, State.standardPrices()).length;
          if (lineCount === 0 &&
              !confirm("No items are checked yet \u2014 export an empty estimate?")) break;
          _exporting = true;
          var btn = t;
          var prevText = btn.textContent;
          btn.disabled = true;
          btn.textContent = "Building\u2026";
          Exporter.exportProject(p, State.standardPrices()).then(function (result) {
            UI.openExportSheet(result);
          }).catch(function (err) {
            console.error("Export failed:", err);
            UI.showExportError("Export failed \u2014 " + ((err && err.message) || "unexpected error"));
          }).then(function () {
            // finally: always restore the button, success or failure.
            _exporting = false;
            btn.disabled = false;
            btn.textContent = prevText;
          });
          break;
        }

        case "export-download":
          UI.downloadExport();
          break;

        case "export-share":
          UI.shareExport();
          break;
      }
    }

    function onChange(e) {
      var el = e.target;
      var role = el.dataset ? el.dataset.role : null;
      if (role === "check") {
        State.toggleLine(el.dataset.roomId, el.dataset.groupId, el.dataset.itemId, el.checked);
        UI.render();
      } else if (role === "no-action") {
        State.toggleNoAction(el.dataset.roomId, el.dataset.groupId);
        UI.render();
      }
    }

    function onInput(e) {
      var el = e.target;
      if (!el.dataset || el.dataset.role !== "qty") return;
      // Qty keystroke: update state + affected totals in place (no full re-render).
      State.setQty(el.dataset.roomId, el.dataset.groupId, el.dataset.itemId, el.value);
      UI.refreshTotals(el.dataset.roomId);
    }

    function bind() {
      document.body.addEventListener("click", onClick);
      document.body.addEventListener("change", onChange);
      document.body.addEventListener("input", onInput);
      // Persist promptly when the tab is hidden or unloaded.
      document.addEventListener("visibilitychange", function () {
        if (document.hidden) State.flush();
      });
      window.addEventListener("pagehide", function () { State.flush(); });
    }

    return { bind: bind };
  })();

  /* ---------- boot ---------- */
  State.init();
  Store.openDB().catch(function () {});
  Events.bind();
  UI.render();
  </script>
</body>
</html>
